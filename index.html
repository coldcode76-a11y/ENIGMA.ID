<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ENIGMA SERVER</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:'Segoe UI',sans-serif;
 background:#000;
 color:white;
 overflow-x:hidden;
}

/* LOADING */
#loader{
 position:fixed;
 width:100%;
 height:100%;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:999;
 font-size:25px;
 letter-spacing:3px;
 color:#FFD700;
}

/* NAV */
.nav{
 display:flex;
 justify-content:space-between;
 padding:15px 30px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 position:fixed;
 width:100%;
 z-index:10;
}
.nav h1{color:#FFD700}
.nav button{
 background:none;border:none;color:white;margin-left:15px;cursor:pointer;
}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
}

.hero img{
 width:200px;
 animation:float 3s infinite;
}
@keyframes float{
 0%{transform:translateY(0)}
 50%{transform:translateY(-10px)}
 100%{transform:translateY(0)}
}

.title{
 font-size:50px;
 background:linear-gradient(45deg,#FFD700,#fff);
 -webkit-background-clip:text;
 color:transparent;
}

.slogan{
 opacity:0.7;
 margin:10px 0;
}

/* CARD */
.card{
 background:rgba(20,20,20,0.7);
 border-radius:20px;
 padding:25px;
 margin:20px;
 backdrop-filter:blur(10px);
 box-shadow:0 0 30px rgba(255,215,0,0.2);
}

/* STATUS BAR */
.bar{
 height:8px;
 background:#222;
 border-radius:10px;
 overflow:hidden;
 margin:10px 0;
}
.fill{
 height:100%;
 background:#FFD700;
 width:0%;
}

/* BUTTON */
.btn{
 display:inline-block;
 padding:12px 20px;
 margin:10px;
 border-radius:30px;
 text-decoration:none;
 font-weight:bold;
 color:white;
 transition:0.2s;
}
.btn:hover{transform:scale(1.05)}
.discord{background:#5865F2}
.whatsapp{background:#25D366}

/* PAGE */
.page{display:none}
.active{display:block}
</style>
</head>

<body>

<div id="loader">ENIGMA LOADING...</div>

<div class="nav">
<h1>ENIGMA</h1>
<div>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('how')">How</button>
<button onclick="showPage('community')">Community</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page active hero">
<img src="https://i.postimg.cc/F1fQdYVv/file-000000002e0c71fab5230bc42b5b3130.png">
<div class="title">ENIGMA</div>
<div class="slogan">🔥 Ultimate Freedom Private Server</div>

<div class="card">
<div id="status">Loading...</div>
<div id="players">Players: 0</div>

<div class="bar"><div id="barFill" class="fill"></div></div>

<p>IP: 91.134.85.13:17091</p>

<a class="btn whatsapp" href="https://chat.whatsapp.com/Bgn1nn4B9qSGJ437zLDTWo?mode=gi_t">JOIN</a>
</div>
</div>

<!-- HOW -->
<div id="how" class="page">
<div class="card">
<h2>HOW TO PLAY</h2>
<p>Download PowerTunnel / Virtual Host</p>
<p>Masukkan host lalu buka Growtopia</p>
</div>
</div>

<!-- COMMUNITY -->
<div id="community" class="page">
<div class="card">
<h2>COMMUNITY</h2>
<a class="btn whatsapp" href="https://chat.whatsapp.com/Bgn1nn4B9qSGJ437zLDTWo?mode=gi_t">JOIN WHATSAPP</a>
</div>
</div>

<script>
// LOADER
setTimeout(()=>document.getElementById("loader").style.display="none",1500);

// PAGE
function showPage(p){
 document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

// API
async function loadServer(){
 try{
  const res=await fetch("https://api.gtps.cloud/api/server/public/3141");
  const data=await res.json();

  let online=data.state.server_status==1;
  let players=data.state.players_online;

  document.getElementById("status").innerHTML =
   online?"🟢 ONLINE":"🔴 OFFLINE";

  document.getElementById("players").innerHTML =
   "Players: "+players;

  document.getElementById("barFill").style.width =
   Math.min(players*2,100)+"%";

 }catch{
  document.getElementById("status").innerHTML="ERROR";
 }
}
loadServer();
setInterval(loadServer,4000);
</script>

</body>
</html>
