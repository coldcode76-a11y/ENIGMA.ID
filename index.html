<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clouds — Cyberpunk</title>

<style>
/* ================== THEME ================== */
:root{
  --bg:#020617;
  --card:#0b1222;
  --glass:rgba(255,255,255,0.06);
  --cyan:#22d3ee;
  --pink:#ff00ff;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --ok:#10b981;
  --bad:#ef4444;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:linear-gradient(135deg,#020617,#0f172a);
  overflow-x:hidden;
}

/* ================== CANVAS BG ================== */
#bg{
  position:fixed; inset:0; z-index:-1;
}

/* ================== LOADER ================== */
#loader{
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  background:#020617;
  transition:opacity .4s ease;
}
.spinner{
  width:64px;height:64px;border-radius:50%;
  border:4px solid rgba(255,255,255,.1);
  border-top-color:var(--cyan);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{margin-top:12px;color:var(--muted)}

/* ================== NAV ================== */
nav{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.brand{font-weight:800; letter-spacing:.5px}
.brand span{color:var(--cyan); text-shadow:0 0 12px var(--cyan)}
.menu a{
  margin:0 8px; text-decoration:none; color:var(--text); font-weight:600;
}
.menu a:hover{color:var(--cyan)}
.wallet{color:var(--cyan); font-weight:700}

/* ================== HERO ================== */
.hero{
  text-align:center; padding:60px 16px 30px;
}
.hero h1{
  margin:0; font-size:44px;
  color:var(--cyan);
  text-shadow:0 0 16px var(--cyan), 0 0 28px rgba(255,0,255,.6);
}
.hero p{color:var(--muted); margin:8px 0}

/* ================== BADGES ================== */
.badges{margin-top:10px}
.badge{
  display:inline-block; margin:6px; padding:6px 12px; border-radius:999px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08);
  font-size:13px;
}
.badge.ok{background:rgba(16,185,129,.15); border-color:rgba(16,185,129,.4)}
.badge.bad{background:rgba(239,68,68,.15); border-color:rgba(239,68,68,.4)}

/* ================== LAYOUT ================== */
.section{padding:30px 16px}
.grid{display:flex; flex-wrap:wrap; gap:12px; justify-content:center}

/* ================== CARD ================== */
.card{
  width:170px;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.25));
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px; padding:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  transition:.2s ease;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 30px rgba(0,0,0,.6), 0 0 20px rgba(34,211,238,.25);
}
.card h3{margin:6px 0 4px}
.price{color:var(--muted); font-size:13px}

/* ================== BUTTON ================== */
.btn{
  display:inline-block; margin-top:10px; padding:10px 14px;
  border-radius:999px; border:1px solid rgba(255,255,255,.1);
  background:linear-gradient(45deg, var(--cyan), var(--pink));
  color:black; font-weight:800; cursor:pointer;
}
.btn.secondary{
  background:linear-gradient(180deg,#1f2937,#0b1222);
  color:white;
}
.btn:active{transform:scale(.98)}

/* ================== AUTH ================== */
#auth{
  text-align:center; padding:30px 16px;
}
.input{
  padding:10px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.1);
  background:#0b1222; color:white; margin:6px; outline:none;
}

/* ================== TABS ================== */
.tabs{display:flex; justify-content:center; gap:8px; margin-bottom:10px}
.tab{
  padding:8px 14px; border-radius:999px; background:#1f2937; cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
}
.tab.active{background:var(--cyan); color:black}
.box{
  max-width:560px; margin:auto;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px; padding:16px; line-height:1.7;
}

/* ================== LIST ================== */
.list{
  max-width:560px; margin:10px auto;
}
.item{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px; padding:10px; margin:6px 0;
}

/* ================== FOOTER ================== */
footer{
  text-align:center; padding:18px; color:var(--muted);
  border-top:1px solid rgba(255,255,255,.06);
}

/* small */
@media (max-width:420px){
  .card{width:150px}
}
</style>
</head>

<body>

<!-- ============ LOADER ============ -->
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Booting Clouds…</div>
</div>

<!-- ============ BG CANVAS ============ -->
<canvas id="bg"></canvas>

<!-- ============ NAV ============ -->
<nav>
  <div class="brand"><span>⚡</span> CLOUDS</div>
  <div class="menu">
    <a href="#how">How</a>
    <a href="#shop">Shop</a>
    <a href="#inventory">Inventory</a>
  </div>
  <div class="wallet">💰 <span id="coins">0</span></div>
</nav>

<!-- ============ AUTH ============ -->
<section id="auth">
  <h2>Login / Register</h2>
  <input id="username" class="input" placeholder="Username"/>
  <br/>
  <input id="password" type="password" class="input" placeholder="Password"/>
  <br/>
  <button class="btn secondary" id="btnRegister">Register</button>
  <button class="btn" id="btnLogin">Login</button>
</section>

<!-- ============ APP ============ -->
<div id="app" style="display:none">

  <section class="hero">
    <h1>clouds.ps</h1>
    <p>Cyberpunk Network • Stable • Smooth</p>
    <div class="badges">
      <span id="status" class="badge">Loading…</span>
      <span id="ping" class="badge">Ping: -</span>
      <span id="worlds" class="badge">Worlds: -</span>
    </div>
  </section>

  <!-- HOW -->
  <section class="section" id="how">
    <h2 style="text-align:center">How To Play</h2>
    <div class="tabs">
      <div class="tab active" data-tab="a">Android</div>
      <div class="tab" data-tab="w">Windows</div>
      <div class="tab" data-tab="i">iOS</div>
    </div>
    <div class="box" id="howBox"></div>
  </section>

  <!-- SHOP -->
  <section class="section" id="shop">
    <h2 style="text-align:center">Role Shop</h2>
    <div class="grid" id="shopGrid"></div>
    <div style="text-align:center">
      <button class="btn secondary" id="btnAddCoins">+1000 Coins (Test)</button>
    </div>
  </section>

  <!-- INVENTORY -->
  <section class="section" id="inventory">
    <h2 style="text-align:center">Inventory</h2>
    <div class="list" id="invList"></div>
  </section>

  <footer>© 2026 CLOUDS — Cyberpunk Mode</footer>
</div>

<script>
/* ================== SAFE HELPERS ================== */
const $ = (id)=>document.getElementById(id);
function safeJSONParse(s, fallback){
  try{ return JSON.parse(s) }catch{ return fallback }
}
function setText(el, txt){ if(el) el.textContent = txt }

/* ================== LOADER ================== */
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    const l = $("loader");
    if(l){ l.style.opacity = "0"; setTimeout(()=>l.remove(), 400); }
  }, 500);
});

/* ================== PARTICLES ================== */
(function initParticles(){
  const c = $("bg");
  const ctx = c.getContext("2d");
  function resize(){ c.width = innerWidth; c.height = innerHeight }
  resize(); addEventListener("resize", resize);

  const P = [];
  const COUNT = 80;
  for(let i=0;i<COUNT;i++){
    P.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      vx:(Math.random()-0.5)*0.6,
      vy:(Math.random()-0.5)*0.6
    });
  }

  function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    // points
    P.forEach(p=>{
      ctx.fillStyle = "rgba(34,211,238,0.7)";
      ctx.fillRect(p.x, p.y, 2, 2);
    });
    // lines
    for(let i=0;i<P.length;i++){
      for(let j=i+1;j<P.length;j++){
        const a=P[i], b=P[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const d=Math.hypot(dx,dy);
        if(d<110){
          ctx.strokeStyle = "rgba(255,0,255,"+(1-d/110)*0.2+")";
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    // move
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>c.width) p.vx*=-1;
      if(p.y<0||p.y>c.height) p.vy*=-1;
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ================== STORAGE ================== */
function getUsers(){
  return safeJSONParse(localStorage.getItem("users"), {});
}
function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

/* ================== STATE ================== */
let currentUser = null;

/* ================== AUTH ================== */
$("btnRegister").onclick = ()=>{
  const u = $("username").value.trim();
  const p = $("password").value;
  if(!u || !p) return alert("Isi username & password");
  const users = getUsers();
  if(users[u]) return alert("User sudah ada");
  users[u] = { password:p, coins:1000, inv:[] };
  saveUsers(users);
  alert("Register berhasil");
};

$("btnLogin").onclick = ()=>{
  const u = $("username").value.trim();
  const p = $("password").value;
  const users = getUsers();
  if(!users[u]) return alert("User tidak ada");
  if(users[u].password !== p) return alert("Password salah");

  currentUser = u;
  $("auth").style.display = "none";
  $("app").style.display = "block";
  loadUser();
};

/* ================== USER ================== */
function loadUser(){
  const users = getUsers();
  const data = users[currentUser];
  setText($("coins"), data.coins);
  renderShop();
  renderInv();
}

$("btnAddCoins").onclick = ()=>{
  const users = getUsers();
  users[currentUser].coins += 1000;
  saveUsers(users);
  loadUser();
};

/* ================== SHOP ================== */
const ROLES = [
  {name:"VIP", price:1000},
  {name:"VIP+", price:3000},
  {name:"Moderator", price:7000},
  {name:"Admin", price:15000},
  {name:"Creator", price:10000},
  {name:"God", price:50000}
];

function buyRole(r){
  const users = getUsers();
  const data = users[currentUser];
  if(data.coins < r.price) return alert("Coins tidak cukup");
  data.coins -= r.price;
  data.inv.push(r.name);
  saveUsers(users);
  loadUser();
}

function renderShop(){
  const wrap = $("shopGrid");
  wrap.innerHTML = "";
  ROLES.forEach(r=>{
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `
      <h3>${r.name}</h3>
      <div class="price">${r.price} Coins</div>
    `;
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = "Buy";
    b.onclick = ()=>buyRole(r);
    d.appendChild(b);
    wrap.appendChild(d);
  });
}

/* ================== INVENTORY ================== */
function renderInv(){
  const list = $("invList");
  list.innerHTML = "";
  const users = getUsers();
  const data = users[currentUser];
  if(!data.inv.length){
    list.innerHTML = `<div class="item">Kosong</div>`;
    return;
  }
  data.inv.forEach(i=>{
    const el = document.createElement("div");
    el.className = "item";
    el.textContent = i;
    list.appendChild(el);
  });
}

/* ================== HOW TABS ================== */
function setHow(tab){
  const box = $("howBox");
  if(tab==="a"){
    box.innerHTML = `
      1. Install PowerTunnel<br/>
      2. Copy host clouds.ps<br/>
      3. Paste ke app<br/>
      4. Open Growtopia & play
    `;
  }
  if(tab==="w"){
    box.innerHTML = `
      1. Open hosts file<br/>
      2. Paste host clouds.ps<br/>
      3. Save<br/>
      4. Open Growtopia
    `;
  }
  if(tab==="i"){
    box.innerHTML = `
      1. Install Surge<br/>
      2. Import URL clouds.ps<br/>
      3. Enable profile<br/>
      4. Play
    `;
  }
}
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = (e)=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    e.currentTarget.classList.add("active");
    setHow(e.currentTarget.dataset.tab);
  };
});
setHow("a");

/* ================== API ================== */
(async function loadAPI(){
  try{
    const s = await fetch("https://api.gtps.cloud/g-api/3141/status").then(r=>r.json());
    const el = $("status");
    el.textContent = s.online ? "● ONLINE" : "● OFFLINE";
    el.classList.add(s.online ? "ok":"bad");
    setText($("ping"), "Ping: " + (s.ping ?? "-") + " ms");
  }catch(e){
    setText($("status"), "API ERROR");
  }

  try{
    const w = await fetch("https://api.gtps.cloud/g-api/3141/worlds").then(r=>r.json());
    setText($("worlds"), "Worlds: " + (w.length ?? "-"));
  }catch(e){
    setText($("worlds"), "Worlds: -");
  }
})();
</script>

</body>
</html>
