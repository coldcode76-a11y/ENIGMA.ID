<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ENIGMA SERVER</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:'Segoe UI',sans-serif;
 background:#000;
 color:#fff;
 overflow-x:hidden;
}

/* LOADING */
#loader{
 position:fixed;
 width:100%;
 height:100%;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:999;
 font-size:30px;
 color:#FFD700;
 letter-spacing:3px;
}

/* PARTICLE */
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}

/* NAV */
.nav{
 position:fixed;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:15px 30px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 z-index:10;
}
.nav h1{color:#FFD700}
.nav button{
 background:none;
 border:none;
 color:white;
 margin-left:15px;
 cursor:pointer;
}

/* PAGE TRANSITION */
.page{
 display:none;
 padding-top:100px;
 opacity:0;
 transform:translateY(20px);
 transition:0.5s;
}
.active{
 display:block;
 opacity:1;
 transform:translateY(0);
}

/* HERO */
.hero{text-align:center;padding:80px 20px}
.logo{
 width:180px;
 animation:float 3s infinite;
 filter:drop-shadow(0 0 25px gold);
}
@keyframes float{
 0%{transform:translateY(0)}
 50%{transform:translateY(-20px)}
 100%{transform:translateY(0)}
}

.title{
 font-size:55px;
 background:linear-gradient(45deg,#FFD700,#fff);
 -webkit-background-clip:text;
 color:transparent;
}

/* CARD */
.card{
 background:rgba(20,20,20,0.7);
 padding:25px;
 border-radius:20px;
 margin:20px auto;
 max-width:500px;
 backdrop-filter:blur(10px);
 box-shadow:0 0 40px rgba(255,215,0,0.2);
}

/* BUTTON */
.btn{
 display:block;
 padding:12px;
 margin:10px 0;
 border-radius:30px;
 text-align:center;
 text-decoration:none;
 font-weight:bold;
 color:white;
 background:#FFD700;
 color:black;
 transition:0.3s;
}
.btn:hover{
 transform:scale(1.05);
 box-shadow:0 0 25px gold;
}

/* INPUT */
input{
 width:100%;
 padding:12px;
 margin:6px 0;
 border-radius:10px;
 border:none;
 background:#222;
 color:white;
}

/* MOUSE GLOW */
.cursor{
 position:fixed;
 width:20px;
 height:20px;
 background:gold;
 border-radius:50%;
 pointer-events:none;
 filter:blur(10px);
}

/* CHAT */
.chatbox{max-height:200px;overflow:auto;text-align:left}
</style>
</head>

<body>

<div id="loader">ENIGMA LOADING...</div>
<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<div class="nav">
<h1>ENIGMA</h1>
<div>
<button onclick="show('home')">Home</button>
<button onclick="show('how')">How</button>
<button onclick="show('login')">GrowID</button>
<button onclick="show('chat')">Chat</button>
<button onclick="show('shop')">Shop</button>
<button onclick="show('admin')">Admin</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<img class="logo" src="https://i.postimg.cc/F1fQdYVv/file-000000002e0c71fab5230bc42b5b3130.png">
<div class="title">ENIGMA</div>
<p>🔥 Ultimate Chaos Experience</p>
</div>

<div class="card">
<div id="status">Loading...</div>
<div id="players">0</div>
</div>
</div>

<!-- HOW -->
<div id="how" class="page">
<div class="card">
<h2>HOW TO PLAY</h2>
<p>Install PowerTunnel / Virtual Host</p>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="card">
<h2>LOGIN</h2>
<input id="user">
<button class="btn" onclick="login()">Login</button>
<p id="userInfo"></p>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">
<h2>CHAT</h2>
<input id="msg">
<button class="btn" onclick="sendMsg()">Send</button>
<div class="chatbox" id="chatBox"></div>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
<div class="card">
<h2>SHOP</h2>
<button class="btn" onclick="buyVIP()">Buy VIP</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<h2>ADMIN</h2>
<input id="adminCode">
<button class="btn" onclick="adminLogin()">Enter</button>
<div id="adminPanel" style="display:none">
<p>ADMIN MODE</p>
</div>
</div>
</div>

<script>
// LOADER
setTimeout(()=>loader.style.display="none",1500);

// PAGE
function show(p){
 document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

// API
async function load(){
 const res=await fetch("https://api.gtps.cloud/api/server/public/3141");
 const d=await res.json();
 status.innerHTML=d.state.server_status==1?"🟢 ONLINE":"🔴 OFFLINE";
 players.innerHTML="Players: "+d.state.players_online;
}
setInterval(load,5000); load();

// LOGIN
function login(){
 localStorage.setItem("user",user.value);
 userInfo.innerHTML="Logged: "+user.value;
}

// CHAT
function sendMsg(){
 let data=JSON.parse(localStorage.getItem("chat")||"[]");
 data.push(user.value+": "+msg.value);
 localStorage.setItem("chat",JSON.stringify(data));
 chatBox.innerHTML=data.map(m=>"<p>"+m+"</p>").join("");
}

// ADMIN
function adminLogin(){
 if(adminCode.value=="3141"){
  adminPanel.style.display="block";
 }
}

// PARTICLE
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<100;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:Math.random()-0.5,dy:Math.random()-0.5});
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle="gold";
 p.forEach(a=>{
  ctx.beginPath();
  ctx.arc(a.x,a.y,2,0,Math.PI*2);
  ctx.fill();
  a.x+=a.dx;
  a.y+=a.dy;
 });
 requestAnimationFrame(draw);
}
draw();

// CURSOR GLOW
document.addEventListener("mousemove",e=>{
 cursor.style.left=e.clientX+"px";
 cursor.style.top=e.clientY+"px";
});
</script>

</body>
</html>
