<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clouds System</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#020617;
 color:white;
}

/* NAV */
nav{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#111827;
}

.wallet{color:gold;font-weight:bold}

/* BUTTON */
.btn{
 margin:5px;
 padding:10px 15px;
 border:none;
 border-radius:10px;
 background:#1f2937;
 color:white;
 cursor:pointer;
}

.btn:hover{
 background:gold;
 color:black;
}

/* CARD */
.card{
 background:#111827;
 margin:10px;
 padding:15px;
 border-radius:10px;
}

/* FLEX */
.flex{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
}
</style>
</head>

<body>

<nav>
<div>☁️ CLOUDS</div>
<div class="wallet">Coins: <span id="coins">0</span></div>
</nav>

<div id="auth" style="text-align:center; padding:20px;">
<h2>Login / Register</h2>
<input id="username" placeholder="Username"><br><br>
<button class="btn" onclick="login()">Enter</button>
</div>

<div id="app" style="display:none">

<div style="text-align:center;">
<h2>Dashboard</h2>
<p id="status">Status: ...</p>
<p id="ping">Ping: ...</p>
<p id="worlds">Worlds: ...</p>
</div>

<div style="text-align:center;">
<button class="btn" onclick="addCoins()">+1000 Coins</button>
</div>

<h2 style="text-align:center;">Role Shop</h2>

<div class="flex" id="shop"></div>

<h2 style="text-align:center;">Inventory</h2>
<div class="flex" id="inventory"></div>

<div style="text-align:center;">
<button class="btn" onclick="window.open('https://chat.whatsapp.com/Bgn1nn4B9qSGJ437zLDTWo')">WhatsApp</button>
<button class="btn" onclick="window.open('https://discord.gg/Wwve8WcQvM')">Discord</button>
</div>

</div>

<script>

// DATA
let roles = [
 {name:"VIP",price:1000},
 {name:"VIP+",price:3000},
 {name:"Moderator",price:7000},
 {name:"Admin",price:15000},
 {name:"Community Creator",price:5000},
 {name:"Creator",price:10000},
 {name:"God",price:50000}
];

let user=null;
let coins=0;
let inventory=[];

// LOGIN
function login(){
 let name=document.getElementById("username").value;
 if(!name)return alert("Masukkan username");

 user=name;

 coins=parseInt(localStorage.getItem(user+"_coins")||1000);
 inventory=JSON.parse(localStorage.getItem(user+"_inv")||"[]");

 document.getElementById("auth").style.display="none";
 document.getElementById("app").style.display="block";

 update();
 renderShop();
 renderInv();
}

// UPDATE UI
function update(){
 document.getElementById("coins").innerText=coins;
 localStorage.setItem(user+"_coins",coins);
 localStorage.setItem(user+"_inv",JSON.stringify(inventory));
}

// ADD COINS
function addCoins(){
 coins+=1000;
 update();
}

// BUY ROLE
function buy(role){
 if(coins>=role.price){
  coins-=role.price;
  inventory.push(role.name);
  update();
  renderInv();
  alert("Berhasil beli "+role.name);
 }else{
  alert("Coins tidak cukup");
 }
}

// SHOP
function renderShop(){
 let shop=document.getElementById("shop");
 shop.innerHTML="";
 roles.forEach(r=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
  <h3>${r.name}</h3>
  <p>${r.price} Coins</p>
  <button class="btn">Buy</button>
  `;
  div.querySelector("button").onclick=()=>buy(r);
  shop.appendChild(div);
 });
}

// INVENTORY
function renderInv(){
 let inv=document.getElementById("inventory");
 inv.innerHTML="";
 inventory.forEach(i=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerText=i;
  inv.appendChild(div);
 });
}

// API
fetch("https://api.gtps.cloud/g-api/3141/status")
.then(r=>r.json())
.then(d=>{
 document.getElementById("status").innerText="Status: "+(d.online?"ONLINE":"OFFLINE");
 document.getElementById("ping").innerText="Ping: "+d.ping;
});

fetch("https://api.gtps.cloud/g-api/3141/worlds")
.then(r=>r.json())
.then(d=>{
 document.getElementById("worlds").innerText="Worlds: "+d.length;
});

</script>

</body>
</html>
