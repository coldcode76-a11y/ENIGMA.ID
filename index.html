<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ENIGMA SERVER</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:'Segoe UI',sans-serif;
 background:radial-gradient(circle at top,#0a0a0a,#000);
 color:#fff;
 overflow-x:hidden;
}

/* NAV */
.nav{
 display:flex;
 justify-content:space-around;
 padding:15px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(12px);
 border-bottom:1px solid rgba(255,215,0,0.2);
}
.nav button{
 background:transparent;
 border:1px solid rgba(255,215,0,0.3);
 padding:10px 14px;
 color:#FFD700;
 border-radius:12px;
 font-weight:bold;
 transition:0.3s;
}
.nav button:hover{
 background:#FFD700;
 color:black;
 box-shadow:0 0 20px gold;
}

/* PAGE */
.page{display:none;padding:25px}
.active{display:block}

/* HERO */
.hero{
 text-align:center;
 margin-top:20px;
}
.hero h1{
 font-size:38px;
 background:linear-gradient(45deg,#FFD700,#fff);
 -webkit-background-clip:text;
 color:transparent;
 text-shadow:0 0 20px rgba(255,215,0,0.4);
}
.hero p{
 opacity:0.6;
}

/* OWNER CARD */
.owner{
 margin-top:25px;
 padding:25px;
 border-radius:20px;
 background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
 box-shadow:
 0 0 40px rgba(255,215,0,0.15),
 inset 0 0 20px rgba(255,215,0,0.1);
 text-align:center;
}

.owner img{
 width:180px;
 border-radius:20px;
 box-shadow:0 0 30px gold;
}

.owner h2{
 color:#FFD700;
 margin-top:10px;
}

.status{
 opacity:0.7;
}

/* CARD */
.card{
 margin-top:20px;
 padding:20px;
 border-radius:18px;
 background:rgba(15,15,15,0.9);
 border:1px solid rgba(255,215,0,0.15);
 box-shadow:0 0 25px rgba(255,215,0,0.1);
}

/* BUTTON */
.btn{
 display:block;
 width:100%;
 padding:15px;
 margin:10px 0;
 border:none;
 border-radius:14px;
 font-weight:bold;
 background:linear-gradient(45deg,#FFD700,#fff);
 color:black;
 transition:0.3s;
}
.btn:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px gold;
}

/* INPUT */
input{
 width:100%;
 padding:12px;
 border-radius:10px;
 border:none;
 background:#111;
 color:white;
 margin-top:10px;
}

/* TEXT */
.gold{color:#FFD700}

/* PARTICLE */
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('play')">Play</button>
<button onclick="show('leaderboard')">Leaderboard</button>
<button onclick="show('community')">Community</button>
<button onclick="show('tools')">Tools</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="hero">
<h1>ENIGMA SERVER</h1>
<p>⚜ Divine Private Server Experience ⚜</p>
</div>

<div class="owner">

<img src="https://i.postimg.cc/pmN34kjC/me.jpg">

<h2>@Marvin</h2>
<p class="status">Status: Busy</p>
<p class="status">Owner its fans yuika</p>

</div>

<div class="card">
<p id="status">Loading...</p>
<p id="players">0</p>
</div>

</div>

<!-- PLAY -->
<div id="play" class="page">

<div class="card">
<h2 class="gold">ANDROID</h2>

<button class="btn" onclick="window.open('https://powertunnel.id.uptodown.com/android')">
Download PowerTunnel
</button>

<button class="btn" onclick="window.open('https://dash.gtps.cloud/android/3141')">
PowerTunnel Host
</button>

<button class="btn" onclick="window.open('https://www.apkmirror.com/apk/xfalcon/virtual-hosts/virtual-hosts-2-1-0-release/virtual-hosts-2-1-0-android-apk-download/')">
Download Virtual Host
</button>

<button class="btn" onclick="window.open('https://dash.gtps.cloud/how-to-play/3141')">
Virtual Host Config
</button>
</div>

<div class="card">
<h2 class="gold">IOS</h2>
<button class="btn" onclick="window.open('https://dash.gtps.cloud/ios/3141')">
Import Config
</button>
</div>

<div class="card">
<h2 class="gold">PC HOST</h2>
<pre>
91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
</pre>
</div>

</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="page">
<div class="card">
<h2 class="gold">LEADERBOARD</h2>
<div id="playersList">Loading...</div>
</div>
</div>

<!-- COMMUNITY -->
<div id="community" class="page">
<div class="card">
<h2 class="gold">COMMUNITY</h2>
<button class="btn" onclick="window.open('https://chat.whatsapp.com/Bgn1nn4B9qSGJ437zLDTWo?mode=gi_t')">
Join WhatsApp
</button>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
<div class="card">
<h2 class="gold">ITEM SEARCH</h2>
<p class="gold">⚠ must ID</p>

<input id="itemID" placeholder="Enter ID">
<button class="btn" onclick="searchItem()">Search</button>

<img id="itemImg" width="120">
</div>
</div>

<script>

// NAV
function show(p){
 document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

// API
async function load(){
 let res=await fetch("https://api.gtps.cloud/api/server/public/3141");
 let d=await res.json();

 status.innerHTML=d.state.server_status==1?"🟢 ONLINE":"🔴 OFFLINE";
 players.innerHTML="Players: "+d.state.players_online;

 playersList.innerHTML="Players Online: "+d.state.players_online;
}
setInterval(load,5000); load();

// ITEM
function searchItem(){
 let id=itemID.value;
 if(isNaN(id)||id===""){
  alert("Item ID harus angka!");
  return;
 }
 itemImg.src="https://api.gtps.cloud/api/item/texture/3141/"+id;
}

// PARTICLE
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<80;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height,dy:Math.random()+0.5});
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle="gold";
 p.forEach(a=>{
  ctx.beginPath();
  ctx.arc(a.x,a.y,1.5,0,Math.PI*2);
  ctx.fill();
  a.y+=a.dy;
  if(a.y>c.height) a.y=0;
 });
 requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
