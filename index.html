<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ENIGMA SERVER</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#1a1a1a;
 color:white;
}

/* NAV */
.nav{
 display:flex;
 justify-content:space-around;
 background:#2b2b2b;
 padding:10px;
}
.nav button{
 background:#444;
 border:none;
 padding:10px;
 color:white;
 border-radius:8px;
}

/* PAGE */
.page{display:none;padding:15px}
.active{display:block}

/* BOX */
.box{
 background:#2e2e2e;
 border:3px solid #555;
 padding:15px;
 border-radius:10px;
 margin-bottom:15px;
 text-align:center;
}

/* BUTTON */
.btn{
 display:block;
 width:100%;
 padding:14px;
 margin:6px 0;
 background:#ffcc00;
 color:black;
 border:none;
 border-radius:8px;
 font-weight:bold;
}

/* INPUT */
input{
 width:100%;
 padding:12px;
 margin:5px 0;
 border-radius:8px;
 border:none;
}

/* FLOAT LOGO */
.logo{
 width:120px;
 animation:float 3s infinite;
}
@keyframes float{
 50%{transform:translateY(-10px)}
}

/* COOKIE */
#cookie{
 position:fixed;
 bottom:0;
 width:100%;
 background:black;
 padding:10px;
 text-align:center;
}
</style>

</head>
<body>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('how')">Play</button>
<button onclick="show('login')">Login</button>
<button onclick="show('register')">Register</button>
<button onclick="show('chat')">Chat</button>
<button onclick="show('shop')">Shop</button>
<button onclick="show('search')">Item</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="box">
<img class="logo" src="https://i.postimg.cc/F1fQdYVv/file-000000002e0c71fab5230bc42b5b3130.png">
<h2>ENIGMA SERVER</h2>
<p id="status">Loading...</p>
<p id="players">0</p>
</div>
</div>

<!-- HOW -->
<div id="how" class="page">
<div class="box">
<h3>ANDROID</h3>
<button class="btn" onclick="window.open('https://powertunnel.id.uptodown.com/android')">Download PowerTunnel</button>
<button class="btn" onclick="window.open('https://dash.gtps.cloud/android/3141')">Host Android</button>

<h3>IOS</h3>
<button class="btn" onclick="window.open('https://dash.gtps.cloud/ios/3141')">Import iOS</button>

<h3>WINDOWS</h3>
<pre>
91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
</pre>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
<div class="box">
<h3>REGISTER</h3>
<input id="ruser" placeholder="Username">
<input id="remail" placeholder="Email">
<input id="rpass" placeholder="Password">
<button class="btn" onclick="register()">Register</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="box">
<h3>LOGIN</h3>
<input id="luser">
<input id="lpass">
<button class="btn" onclick="login()">Login</button>
<p id="loginInfo"></p>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="box">
<h3>GLOBAL CHAT</h3>
<input id="msg">
<button class="btn" onclick="sendMsg()">Send</button>
<div id="chatBox"></div>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
<div class="box">
<h3>SHOP</h3>
<p>Balance: <span id="bal">0</span></p>
<button class="btn" onclick="buy()">Buy VIP</button>
</div>
</div>

<!-- ITEM SEARCH -->
<div id="search" class="page">
<div class="box">
<h3>ITEM SEARCH</h3>
<input id="itemID" placeholder="Item ID">
<button class="btn" onclick="searchItem()">Search</button>
<img id="itemImg" width="100">
</div>
</div>

<!-- COOKIE -->
<div id="cookie">
<p>This website uses cookies</p>
<button onclick="cookie.style.display='none'">Allow</button>
</div>

<script>

// NAV
function show(p){
 document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

// API
async function load(){
 let res=await fetch("https://api.gtps.cloud/api/server/public/3141");
 let d=await res.json();
 status.innerHTML=d.state.server_status==1?"ONLINE":"OFFLINE";
 players.innerHTML="Players: "+d.state.players_online;
}
setInterval(load,5000); load();

// REGISTER
function register(){
 let users=JSON.parse(localStorage.getItem("users")||"{}");
 users[ruser.value]={pass:rpass.value,email:remail.value,bal:100};
 localStorage.setItem("users",JSON.stringify(users));
 alert("Registered");
}

// LOGIN
function login(){
 let users=JSON.parse(localStorage.getItem("users")||"{}");
 if(users[luser.value] && users[luser.value].pass==lpass.value){
  localStorage.setItem("user",luser.value);
  loginInfo.innerHTML="Login success";
  updateUser();
 } else {
  loginInfo.innerHTML="Wrong";
 }
}

// USER
function updateUser(){
 let u=localStorage.getItem("user");
 if(!u)return;
 let users=JSON.parse(localStorage.getItem("users"));
 bal.innerHTML=users[u].bal;
}
updateUser();

// CHAT
function sendMsg(){
 let data=JSON.parse(localStorage.getItem("chat")||"[]");
 data.push(msg.value);
 localStorage.setItem("chat",JSON.stringify(data));
 chatBox.innerHTML=data.map(x=>"<p>"+x+"</p>").join("");
}

// SHOP
function buy(){
 let u=localStorage.getItem("user");
 let users=JSON.parse(localStorage.getItem("users"));
 users[u].bal-=10;
 localStorage.setItem("users",JSON.stringify(users));
 updateUser();
}

// ITEM SEARCH
function searchItem(){
 itemImg.src="https://api.gtps.cloud/api/item/texture/3141/"+itemID.value;
}

</script>

</body>
</html>
